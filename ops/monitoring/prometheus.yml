global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Viola Services ────────────────────────────────────────────────────────

  - job_name: gateway-api
    static_configs:
      - targets: ["gateway-api:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: detection
    static_configs:
      - targets: ["detection:9090"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: graph
    static_configs:
      - targets: ["graph:9091"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: auth
    static_configs:
      - targets: ["auth:8081"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: intel
    static_configs:
      - targets: ["intel:8082"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: response
    static_configs:
      - targets: ["response:8083"]
    metrics_path: /metrics
    scrape_interval: 30s

  # ── Infrastructure ────────────────────────────────────────────────────────

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Kafka metrics via JMX exporter (if configured)
  - job_name: kafka
    static_configs:
      - targets: ["kafka:7071"]
    scrape_interval: 30s

  # Kafka consumer lag exporter
  - job_name: kafka-lag-exporter
    static_configs:
      - targets: ["kafka-lag-exporter:8000"]
    scrape_interval: 30s

  # Postgres exporter
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s
