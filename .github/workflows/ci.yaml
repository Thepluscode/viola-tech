name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go: Lint, Test, Build ─────────────────────────────────────────────
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: golangci-lint (shared)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: shared/go

  go-services:
    runs-on: ubuntu-latest
    needs: go-lint
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - ingestion
          - detection
          - workers
          - gateway-api
          - graph
          - intel
          - response
          - cloud-connector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go build ./...
      - name: Test ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go test -race -count=1 -timeout 120s ./...
      - name: Vet ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go vet ./...

  go-agent:
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build agent
        run: cd agent && go build ./...
      - name: Test agent
        run: cd agent && go test -race -count=1 -timeout 60s ./...

  go-shared:
    runs-on: ubuntu-latest
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build shared
        run: cd shared/go && go build ./...
      - name: Test shared
        run: cd shared/go && go test -race -count=1 -timeout 60s ./...

  # ── Python: ML Detection ─────────────────────────────────────────────
  ml-detection:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-detection
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ml-detection/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: python -m py_compile cmd/ml-detection/main.py
      - name: Import check
        run: python -c "from internal.models.anomaly import AnomalyDetector; from internal.pipeline.consumer import MLPipeline"

  # ── Frontend: Lint, Typecheck, Build ──────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npx tsc --noEmit --if-present || true
      - name: Build
        run: npm run build

  # ── Proto: Validate schemas ───────────────────────────────────────────
  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.47.2"
      - name: Buf lint
        run: buf lint shared/proto/ || true

  # ── Gate ──────────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [go-services, go-agent, go-shared, ml-detection, frontend, proto-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.go-services.result }}" == "failure" ]] || \
             [[ "${{ needs.go-agent.result }}" == "failure" ]] || \
             [[ "${{ needs.go-shared.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All checks passed"
