apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-detection
  labels:
    {{- include "viola.labels" . | nindent 4 }}
    {{- include "viola.selectorLabels" (dict "component" "detection" "Release" .Release) | nindent 4 }}
spec:
  replicas: {{ .Values.detection.replicaCount }}
  selector:
    matchLabels:
      {{- include "viola.selectorLabels" (dict "component" "detection" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "viola.selectorLabels" (dict "component" "detection" "Release" .Release) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.detection.metricsPort }}"
    spec:
      serviceAccountName: {{ include "viola.serviceAccountName" . }}
      containers:
        - name: detection
          image: {{ include "viola.image" (dict "global" .Values.global "image" .Values.detection.image "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.detection.metricsPort }}
              protocol: TCP
          env:
            {{- include "viola.commonEnv" . | nindent 12 }}
            - name: METRICS_PORT
              value: {{ .Values.detection.metricsPort | quote }}
            {{- range $k, $v := .Values.detection.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.detection.resources | nindent 12 }}
