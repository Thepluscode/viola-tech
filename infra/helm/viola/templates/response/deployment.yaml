apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-response
  labels:
    {{- include "viola.labels" . | nindent 4 }}
    {{- include "viola.selectorLabels" (dict "component" "response" "Release" .Release) | nindent 4 }}
spec:
  replicas: {{ .Values.response.replicaCount }}
  selector:
    matchLabels:
      {{- include "viola.selectorLabels" (dict "component" "response" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "viola.selectorLabels" (dict "component" "response" "Release" .Release) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "viola.serviceAccountName" . }}
      containers:
        - name: response
          image: {{ include "viola.image" (dict "global" .Values.global "image" .Values.response.image "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.response.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.response.port | quote }}
            {{- include "viola.postgresEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.response.resources | nindent 12 }}
